<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Lucivy Emscripten Test</title></head>
<body>
<pre id="output"></pre>
<script type="module">
import { Lucivy } from './js/lucivy.js';

const out = document.getElementById('output');
function log(msg) { out.textContent += msg + '\n'; console.log(msg); }

// Catch unhandled errors/rejections
window.addEventListener('error', e => {
    log('UNCAUGHT: ' + e.message);
    window.__TEST_RESULT__ = 'FAIL: uncaught ' + e.message;
});
window.addEventListener('unhandledrejection', e => {
    log('UNHANDLED REJECTION: ' + e.reason);
    window.__TEST_RESULT__ = 'FAIL: unhandled rejection ' + e.reason;
});

// Timeout safety net
const timeout = setTimeout(() => {
    log('TIMEOUT: test did not complete in 45s');
    window.__TEST_RESULT__ = 'FAIL: timeout';
}, 45000);

try {
    log('Creating worker...');
    const lucivy = new Lucivy('./js/lucivy-worker.js');
    log('Waiting for module init...');
    await lucivy.ready;
    log('Emscripten module loaded');

    const idx = await lucivy.create('/test-index', [
        { name: 'title', type: 'text' },
        { name: 'body', type: 'text' },
    ], 'english');
    log('Index created');

    log('Adding doc 0...');
    await idx.add(0, { title: 'Rust programming', body: 'Rust is a systems programming language' });
    log('Adding doc 1...');
    await idx.add(1, { title: 'Python scripting', body: 'Python is great for data science' });
    log('Adding doc 2...');
    await idx.add(2, { title: 'JavaScript', body: 'JS runs in browsers and servers' });
    log('Committing...');
    await idx.commit();

    const numDocs = await idx.numDocs();
    log('Num docs: ' + numDocs);
    if (numDocs !== 3) throw new Error('Expected 3 docs, got ' + numDocs);

    // BM25 search
    const r1 = await idx.search('rust programming');
    log('Search "rust programming": ' + JSON.stringify(r1));
    if (r1.length === 0) throw new Error('Expected results for "rust programming"');
    if (r1[0].docId !== 0) throw new Error('Expected docId 0, got ' + r1[0].docId);

    // Contains search with highlights
    const r2 = await idx.search({ type: 'contains', field: 'body', value: 'science' }, { highlights: true });
    log('Search contains "science" with highlights: ' + JSON.stringify(r2));
    if (r2.length === 0) throw new Error('Expected results for "science"');
    if (!r2[0].highlights) throw new Error('Expected highlights');

    // Delete + re-commit
    await idx.remove(1);
    await idx.commit();
    const numDocs2 = await idx.numDocs();
    log('After delete, num docs: ' + numDocs2);
    if (numDocs2 !== 2) throw new Error('Expected 2 docs after delete, got ' + numDocs2);

    // Schema
    const schema = await idx.schema();
    log('Schema: ' + JSON.stringify(schema));

    // ── Snapshot export/import ──────────────────────────────────────
    // Reuse the existing index (idx) to avoid thread pool exhaustion.
    log('\n--- Snapshot tests ---');

    // Re-add docs for snapshot (idx already has docs 0 and 2 after delete)
    log('Exporting snapshot from existing index...');
    const blob = await idx.exportSnapshot();
    log('Snapshot size: ' + blob.length + ' bytes');
    if (!(blob instanceof Uint8Array)) throw new Error('Expected Uint8Array, got ' + typeof blob);
    if (blob[0] !== 0x4C || blob[1] !== 0x55 || blob[2] !== 0x43 || blob[3] !== 0x45) {
        throw new Error('Bad LUCE magic: ' + blob.slice(0, 4));
    }

    log('Importing snapshot...');
    const restored = await lucivy.importSnapshot(blob, '/snap-restored');
    const restoredCount = await restored.numDocs();
    log('Restored numDocs: ' + restoredCount);
    if (restoredCount !== 2) throw new Error('Expected 2 docs after import, got ' + restoredCount);

    const snapSearch = await restored.search('rust');
    log('Search after import: ' + JSON.stringify(snapSearch));
    if (snapSearch.length === 0) throw new Error('Expected results after snapshot import');

    log('Snapshot tests passed');

    // ── Cleanup ──────────────────────────────────────────────────────
    await restored.destroy();
    await idx.destroy();
    lucivy.terminate();

    clearTimeout(timeout);
    log('\nALL TESTS PASSED');
    window.__TEST_RESULT__ = 'PASS';
} catch (e) {
    clearTimeout(timeout);
    log('FAILED: ' + e.message);
    console.error(e);
    window.__TEST_RESULT__ = 'FAIL: ' + e.message;
}
</script>
</body>
</html>
