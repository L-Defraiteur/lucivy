name: CI

on:
  push:
    branches: [main, v2-alpha]
  pull_request:
    branches: [main, v2-alpha]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        features:
          - label: "default"
            flags: "mmap,stopwords,lz4-compression"
          - label: "all"
            flags: "mmap,stopwords,lz4-compression,zstd-compression,failpoints"
          - label: "minimal"
            flags: ""

    name: test-${{ matrix.features.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          if [ -z "${{ matrix.features.flags }}" ]; then
            cargo build --lib --no-default-features
          else
            cargo build --features ${{ matrix.features.flags }} --no-default-features
          fi

      - name: Run lib tests
        run: |
          if [ -z "${{ matrix.features.flags }}" ]; then
            cargo test --lib --no-default-features
          else
            cargo test --lib --features ${{ matrix.features.flags }} --no-default-features
          fi

  clippy:
    runs-on: ubuntu-latest
    name: clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy (default features)
        run: cargo clippy --lib -- -D warnings

  thread-spawn-audit:
    runs-on: ubuntu-latest
    name: thread-spawn-audit

    steps:
      - uses: actions/checkout@v4

      - name: Check for unguarded thread::spawn in non-test code
        run: |
          # Find thread::spawn outside of #[cfg(test)] blocks and scheduler.rs
          # Allowed: luciole/src/scheduler.rs (the scheduler itself spawns threads)
          #          #[cfg(test)] blocks
          VIOLATIONS=$(grep -rn "thread::spawn\|thread::Builder" src/ lucivy_core/src/ bindings/ \
            --include="*.rs" \
            | grep -v "#\[cfg(test)\]" \
            | grep -v "// WASM-safe" \
            | grep -v "test.rs:" \
            | grep -v "tests::" \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::warning::Found thread::spawn usage that may break WASM:"
            echo "$VIOLATIONS"
            echo ""
            echo "All threading must go through luciole scheduler (actors/tasks)."
            echo "Use #[cfg(not(target_arch = \"wasm32\"))] if native-only."
          fi

  lucivy-python:
    runs-on: ubuntu-latest
    name: lucivy-python

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin + create venv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install maturin

      - name: Build lucivy
        run: |
          . .venv/bin/activate
          cd bindings/python && maturin develop --release

      - name: Test lucivy
        run: |
          . .venv/bin/activate
          python3 -c "
          import lucivy

          # Create index
          idx = lucivy.Index.create('/tmp/ci_test', fields=[
              {'name': 'title', 'type': 'text'},
              {'name': 'body', 'type': 'text'},
              {'name': 'price', 'type': 'f64'},
          ])

          # Add docs
          idx.add(1, title='Rust programming guide', body='Learn systems programming with Rust', price=29.99)
          idx.add(2, title='Python for data science', body='Data analysis with pandas and numpy', price=19.99)
          idx.add(3, title='C++ template metaprogramming', body='Advanced C++ techniques', price=39.99)
          idx.commit()
          assert idx.num_docs == 3, f'Expected 3 docs, got {idx.num_docs}'

          # contains_split (default string query)
          results = idx.search('rust program', limit=10)
          assert len(results) >= 1, 'contains_split should find results'
          assert results[0].doc_id == 1, 'doc 1 should be top result'

          # highlights
          results = idx.search('rust', limit=10, highlights=True)
          assert len(results) >= 1
          assert results[0].highlights is not None
          assert 'title' in results[0].highlights

          # fuzzy (typo)
          results = idx.search({'type': 'contains', 'field': 'body', 'value': 'programing', 'distance': 1}, limit=10)
          assert len(results) >= 1, 'fuzzy should catch typo'

          # regex
          results = idx.search({'type': 'contains', 'field': 'title', 'value': 'program[a-z]+', 'regex': True}, limit=10)
          assert len(results) >= 1, 'regex should match'

          # allowed_ids
          results = idx.search('programming', limit=10, allowed_ids=[1, 3])
          assert all(r.doc_id in (1, 3) for r in results), 'should only return filtered IDs'

          # fields — retrieve stored field values
          results = idx.search('rust', limit=10, fields=True)
          assert len(results) >= 1
          assert results[0].fields is not None
          assert 'title' in results[0].fields, f'expected title in fields, got {results[0].fields}'
          assert 'Rust' in results[0].fields['title'], f'expected Rust in title, got {results[0].fields[\"title\"]}'

          # fields + highlights together
          results = idx.search('rust', limit=10, highlights=True, fields=True)
          assert len(results) >= 1
          assert results[0].highlights is not None
          assert results[0].fields is not None

          # v2 compat: term (cross-token exact match via SFX)
          results = idx.search({'type': 'term', 'field': 'title', 'value': 'programming'}, limit=10)
          assert len(results) >= 1, 'term compat should find results'

          # v2 compat: fuzzy via query type
          results = idx.search({'type': 'fuzzy', 'field': 'body', 'value': 'programing'}, limit=10)
          assert len(results) >= 1, 'fuzzy compat should catch typo'

          # v2 compat: phrase
          results = idx.search({'type': 'phrase', 'field': 'body', 'value': 'systems programming'}, limit=10)
          assert len(results) >= 1, 'phrase compat should find sequence'

          # v2: anchor_start (startsWith behavior)
          results = idx.search({'type': 'contains', 'field': 'title', 'value': 'rust', 'anchor_start': True}, limit=10)
          assert len(results) >= 1, 'anchor_start should find Rust'

          # v2: startsWith compat
          results = idx.search({'type': 'startsWith', 'field': 'title', 'value': 'rust'}, limit=10)
          assert len(results) >= 1, 'startsWith compat should work'

          # snapshot round-trip
          snapshot = idx.export_snapshot()
          assert len(snapshot) > 0, 'snapshot should not be empty'
          idx2 = lucivy.Index.import_snapshot(snapshot, '/tmp/ci_test_snap')
          assert idx2.num_docs == idx.num_docs, 'snapshot should preserve docs'
          results2 = idx2.search('rust', limit=10)
          assert len(results2) >= 1, 'snapshot index should be searchable'

          # delete + update
          idx.delete(2)
          idx.update(3, title='Modern C++', body='C++ best practices')
          idx.commit()
          assert idx.num_docs == 2

          # ── Sharded index ──
          sidx = lucivy.Index.create('/tmp/ci_sharded', fields=[
              {'name': 'title', 'type': 'text'},
              {'name': 'body', 'type': 'text'},
          ], shards=2)
          for i in range(20):
              sidx.add(i, title=f'Doc {i}', body=f'Content for document number {i} about programming')
          sidx.commit()
          assert sidx.num_docs == 20, f'Expected 20 sharded docs, got {sidx.num_docs}'

          results = sidx.search('programming', limit=10)
          assert len(results) >= 1, 'sharded search should find results'

          results = sidx.search({'type': 'contains', 'field': 'body', 'value': 'document', 'distance': 1}, limit=10)
          assert len(results) >= 1, 'sharded fuzzy should work'

          # sharded snapshot round-trip
          snap = sidx.export_snapshot()
          sidx2 = lucivy.Index.import_snapshot(snap, '/tmp/ci_sharded_snap')
          assert sidx2.num_docs == 20, f'sharded snapshot: expected 20, got {sidx2.num_docs}'
          results = sidx2.search('programming', limit=10)
          assert len(results) >= 1, 'sharded snapshot should be searchable'

          # sharded delta sync
          versions = sidx.shard_versions
          assert len(versions) == 2, f'expected 2 shard versions, got {len(versions)}'

          # ── Playground .luce import ──
          import os
          luce_path = os.path.join(os.getcwd(), 'playground', 'dataset.luce')
          if os.path.exists(luce_path):
              pidx = lucivy.Index.import_snapshot_from(luce_path, dest_path='/tmp/ci_playground')
              assert pidx.num_docs > 0, f'playground snapshot should have docs, got {pidx.num_docs}'
              results = pidx.search('function', limit=10)
              assert len(results) >= 1, f'playground search should find results, got {len(results)}'
              results = pidx.search({'type': 'contains', 'field': 'content', 'value': 'pub.*fn', 'regex': True}, limit=10)
              print(f'Playground: {pidx.num_docs} docs, regex search returned {len(results)} results')
          else:
              print(f'SKIP: playground dataset.luce not found at {luce_path}')

          print('All lucivy Python tests passed')
          "

  lucivy-nodejs:
    runs-on: ubuntu-latest
    name: lucivy-nodejs

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build lucivy-napi
        run: cargo build -p lucivy-napi --release

      - name: Prepare .node binary
        run: |
          cp target/release/liblucivy_napi.so bindings/nodejs/lucivy.node

      - name: Test lucivy-nodejs
        run: node bindings/nodejs/test.mjs

  lucivy-cpp:
    runs-on: ubuntu-latest
    name: lucivy-cpp

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build lucivy-cpp
        run: cargo build -p lucivy-cpp --release

      - name: Compile test
        run: |
          INCLUDE_DIR=$(find target/release/build -path "*/lucivy-cpp-*/out/cxxbridge/include" -type d | head -1)
          echo "Include dir: $INCLUDE_DIR"
          ls -la "$INCLUDE_DIR/lucivy-cpp/src/" || true
          g++ -std=c++17 -o /tmp/test_lucivy_cpp bindings/cpp/test.cpp \
            -I "$INCLUDE_DIR" \
            -L target/release -llucivy_cpp \
            -lpthread -ldl -lm

      - name: Test lucivy-cpp
        run: /tmp/test_lucivy_cpp
