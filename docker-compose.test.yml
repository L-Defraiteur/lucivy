services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: lucivy_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d lucivy_test"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
